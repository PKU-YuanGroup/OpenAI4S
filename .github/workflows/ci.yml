# Default-safe PR CI: the offline gate.
#
# Security posture (do not weaken without a security review):
#   - Triggered by plain `pull_request` / `push`, a secret-free schedule, or a
#     manual dispatch only. The privileged
#     `..._target` trigger variant is forbidden in this workflow: it would
#     let PR-controlled code run with access to repository secrets.
#   - `permissions` is read-only (contents: read) for every job.
#   - No secrets are referenced or injected anywhere in this workflow.
#   - GitHub-hosted runners only — no self-hosted runners.
#   - The default offline gate runs pytest plus deterministic `tier:pr`
#     harness scenarios. Pytest's addopts deselect opt-in markers (external /
#     network / live_llm / gpu / ssh / lab / docker / browser), and the harness
#     CLI requires explicit offline eligibility, so neither path uses secrets or
#     live LLM/network/GPU/SSH/Docker/browser/lab resources.
#
# Secret-bearing live-provider/GPU/SSH/lab jobs still belong in a separate
# manually triggered workflow.  This file's browser and macOS jobs use only
# loopback/local resources and receive no repository secrets.

name: CI

on:
  push:
    branches: [main, next]
  pull_request:
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch naming policy
    # Enforces the CONTRIBUTING.md branch-naming table on PR head branches.
    # dependabot branches (dependabot/...) are exempt. `main` is allowed so
    # casual contributors can PR from their fork's main branch.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check head branch name
        env:
          # Never inline ${{ github.head_ref }} into `run:` — branch names
          # are attacker-controlled input; pass through env instead.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          policy='^(main|next|(feat|fix|docs|test|refactor|chore|ui|harness|science|release|hotfix)/[a-z0-9][a-z0-9._-]{1,80})$'
          if printf '%s' "$HEAD_REF" | grep -Eq "$policy"; then
            echo "ok: $HEAD_REF"
          else
            echo "::error::Branch name '$HEAD_REF' violates the naming policy in CONTRIBUTING.md (expected main, next, or <prefix>/<name> with prefix one of feat|fix|docs|test|refactor|chore|ui|harness|science|release|hotfix)"
            exit 1
          fi

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --locked
      - name: pre-commit (black, isort, ruff, mypy, hygiene hooks)
        run: uv run pre-commit run --all-files
      - name: Verify bilingual per-directory documentation coverage
        run: uv run python scripts/check_directory_readmes.py

  type-check:
    name: Type safety (core orchestration boundary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install locked development dependencies
        run: uv sync --locked
      - name: Check the strict agent core and typed Host dispatcher
        run: uv run mypy

  source-security:
    name: Source credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scan tracked release sources without echoing matches
        run: python scripts/source_secret_scan.py

  release-artifacts:
    name: Build and install wheel/sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build standards-compliant release artifacts
        run: uv build --no-sources --out-dir dist --clear
      - name: Verify metadata and all runtime resources
        run: python scripts/verify_release_artifacts.py dist
      - name: Install the core wheel with no index and no dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_INDEX: "1"
        run: |
          python -m venv "${RUNNER_TEMP}/openai4s-release-venv"
          wheel_path="$(find dist -maxdepth 1 -name 'openai4s-*.whl' -print -quit)"
          "${RUNNER_TEMP}/openai4s-release-venv/bin/python" -m pip install --no-deps "$wheel_path"
      - name: Import installed modules and exercise the installed CLI
        env:
          PYTHONPATH: ""
        run: |
          cd "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/openai4s-release-venv/bin/python" "${GITHUB_WORKSPACE}/scripts/release_import_smoke.py"

  test:
    name: Offline tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Keep one science-only job to exercise the no-RDKit fallback. Ubuntu's
      # Python 3.12 job also covers the optional chemistry rendering path.
      - name: Install dev and science dependencies
        if: matrix.python-version == '3.10'
        run: uv sync --locked --extra science
      - name: Install dev, science, and chemistry dependencies
        if: matrix.python-version == '3.12'
        run: uv sync --locked --extra science --extra chemistry
      - name: Byte-compile all first-party sources
        run: uv run python -m compileall -q openai4s openai4s_compute_provider harness tests
      - name: Collect tests (strict markers, default deselection)
        run: uv run pytest --collect-only -q
      - name: Run the offline suite (no secrets, no network, no hardware)
        # addopts already passes -q; a second -q would suppress the summary line.
        run: uv run pytest
      - name: Run deterministic harness contracts
        run: uv run python -m harness.cli run --tier pr --offline
      # Reruns the suite with the response capture installed and compares what
      # the routes returned against docs/response-schemas.json. One matrix entry
      # is enough: the shapes are the server's, not the interpreter's.
      - name: Check the frozen response shapes still match reality
        if: matrix.python-version == '3.12'
        run: uv run python scripts/capture_response_schemas.py --check

  browser-smoke:
    name: Browser workbench E2E (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install the zero-dependency server and browser driver
        run: |
          uv sync --locked
          npm install --no-save --ignore-scripts playwright@1.54.1
          npx playwright install --with-deps chromium
      - name: Start the daemon and open the real workbench
        env:
          OPENAI4S_DATA_DIR: ${{ runner.temp }}/openai4s-browser-smoke
          OPENAI4S_KERNEL_SANDBOX: "off"
          # A CI runner is a Linux host with no keychain and no session bus,
          # so `auto` correctly fails closed here — that is the policy working,
          # not a bug. An ephemeral daemon holding no real credential is the
          # one case where plaintext is the honest answer, so say so explicitly
          # rather than weakening the default for everyone.
          OPENAI4S_SECRET_STORE: plaintext
          OPENAI4S_NOTEBOOK_REPL: "1"
          OPENAI4S_HOST: 127.0.0.1
          OPENAI4S_PORT: "8760"
        run: |
          uv run openai4s serve >"${RUNNER_TEMP}/openai4s-browser.log" 2>&1 &
          daemon_pid=$!
          trap 'kill "$daemon_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8760/ >/dev/null; then
              break
            fi
            if ! kill -0 "$daemon_pid" 2>/dev/null; then
              cat "${RUNNER_TEMP}/openai4s-browser.log"
              exit 1
            fi
            sleep 0.25
          done
          node tests/browser_smoke.mjs
      - name: Show daemon log after a failure
        if: failure()
        run: cat "${RUNNER_TEMP}/openai4s-browser.log" || true

  macos-sandbox-smoke:
    name: macOS sandbox enforcement (nightly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install the zero-dependency runtime
        run: uv sync --locked
      - name: Require real Seatbelt isolation and child-env scrubbing
        env:
          OPENAI4S_KERNEL_SANDBOX: enforce
        run: uv run python -m harness.smoke.macos_sandbox
