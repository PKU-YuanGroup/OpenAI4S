# python — general data science + single-cell + cheminformatics (Python 3.11)
#
# This is the DEFAULT kernel env. It includes the portable top-level dependency
# intent from Claude Science's Python environment plus OpenAI4S's broader
# single-cell, cheminformatics, IO, and plotting stack. Conda resolves native
# and platform-specific transitive dependencies for the target machine; do not
# copy build strings or macOS-only toolchain packages into this shared spec.
name: python
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # single-cell stack
  - scanpy
  - anndata
  - leidenalg
  - python-igraph
  - umap-learn
  - numba
  # machine learning + numerics
  - scikit-learn
  - numpy
  - scipy
  - pandas<3
  # plotting
  - matplotlib
  - seaborn
  - plotly
  - pillow
  # bio + IO + web
  - biopython
  - h5py
  - zarr
  - pyarrow
  - openpyxl
  - pypdf
  - beautifulsoup4
  - httpx
  - socksio
  - pysocks
  - tqdm
  - statsmodels
  - networkx
  # pip-only packages
  - pip
  - pip:
      - fair-esm==2.0.0
      - rdkit-pypi==2022.9.5
      # Claude Science installs pypdfium2 from PyPI so pip can select the
      # matching bundled PDFium wheel for macOS or Linux.
      - pypdfium2==5.9.0
