name: Publish release

# Draft-first, and reachable.
#
# This used to trigger on `release: [created]` with every outward-facing job
# gated on `github.event.release.draft`. GitHub does not emit `release.created`
# for a *draft* release, so the intended entry point could never fire; a
# non-draft creation does emit it, and then the draft conditions skipped
# attachment and publication. The pipeline was unreachable by construction.
#
# The entry point is now explicit: a maintainer creates the draft release (or
# lets the tag push create it), then runs this workflow against that tag. With
# `publish` unset it is a dry run — everything is built and verified, nothing
# leaves. With `publish` set the run must name an existing *draft*, which the
# guard job proves before anything else starts.
#
# The ordering and every check live in scripts/release_pipeline.py rather than
# in this file, because a step that can only run on a release event is tested
# by the thing it is supposed to protect. That script runs on a laptop, under
# --dry-run, and under pytest.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.2.0). Required to publish."
        required: false
        default: ""
      publish:
        description: "Stage onto the existing draft, publish to PyPI, then make the GitHub release public"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  guard:
    name: Require an existing draft release
    if: inputs.publish
    runs-on: ubuntu-latest
    steps:
      - name: The named tag must exist and must still be a draft
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo '::error::publishing requires the "tag" input'
            exit 1
          fi
          if ! gh release view "$TAG" --json isDraft > release.json; then
            echo "::error::no release $TAG exists; create the draft first"
            exit 1
          fi
          if [ "$(jq -r .isDraft release.json)" != "true" ]; then
            echo "::error::$TAG is already public; staging assets onto it is the half-published state this pipeline exists to prevent"
            exit 1
          fi

  build:
    name: Build verified distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Match the tag to both version declarations
        if: inputs.tag != ''
        run: uv run --locked python scripts/verify_release_tag.py "${{ inputs.tag }}"
      - name: Require an annotated tag on main
        if: inputs.publish
        run: |
          if [ "$(git cat-file -t "${{ inputs.tag }}")" != "tag" ]; then
            echo "::error::Release tags must be annotated."
            exit 1
          fi
          git merge-base --is-ancestor HEAD origin/main
      - name: Scan release sources
        run: uv run --locked python scripts/source_secret_scan.py
      - name: Build wheel and source distribution
        run: uv build --no-sources --out-dir dist --clear
      - name: Verify metadata and packaged runtime resources
        run: uv run --locked python scripts/verify_release_artifacts.py dist
      - name: Upload the exact distributions for publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  macos-app:
    name: Build the macOS app image (arm64)
    # The DMG embeds a relocatable CPython plus the native science wheels, so it
    # cannot be cross-built: this must run on an Apple Silicon runner.
    runs-on: macos-14
    steps:
      - name: Checkout the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build the .app and .dmg
        # The identity reaches the build, which is the only place it can be
        # used. Passing it only to the staging job — as before — meant setting
        # the secret changed nothing about how the image was signed while
        # making the gate believe it had been.
        env:
          OPENAI4S_MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: bash scripts/build_macos_dmg.sh
      - name: Verify the image
        # Fails closed on a runtime that did not relocate, an incomplete science
        # stack, a missing Web UI / R worker, a broken signature, or any
        # credential material swept into the bundle.
        run: python3 scripts/verify_macos_bundle.py dist/*.dmg
      - name: Record what actually signed the image, and what is inside it
        # The staging job runs on Linux and has no `codesign`, so the evidence
        # has to be produced here and travel with the image. Without it the
        # gate had nothing to read and fell back to "the identity variable is
        # set", which an ad-hoc image satisfies.
        run: python3 scripts/describe_macos_image.py dist/*.dmg
      - name: Upload the verified app image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-app-image
          path: |
            dist/*.dmg
            dist/*.dmg.codesign.json
            dist/*.dmg.components.json
          if-no-files-found: error
          retention-days: 1

  attach:
    name: Stage assets onto the draft
    # Staging only. This job never makes anything public: the flip lives in
    # `finalize`, after PyPI.
    if: inputs.publish
    needs: [guard, build, macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: assets/
      - name: Download the verified app image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-app-image
          path: assets/
      - name: Check out the pipeline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          path: source
      # `--from-artifacts` is what stops this job from re-running `build` and
      # `pytest`: its inputs are the artifacts the earlier jobs produced and
      # verified, and rebuilding here would put different bytes on GitHub than
      # PyPI receives. `--stop-after reverify` is what stops it from publishing.
      - name: Stage, prove and verify the release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          python source/scripts/release_pipeline.py \
            --version "${TAG#v}" \
            --mode release \
            --from-artifacts \
            --stop-after reverify \
            --assets-dir assets \
            --json

  pypi:
    name: Publish to PyPI with OIDC
    if: inputs.publish
    # A version number, once taken on an index, is taken forever, so this may
    # only run from the staged path where every check has already passed.
    needs: [guard, build, macos-app, attach]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openai4s/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions
        # NOT SHA-pinned, unlike every other action here: this one is a Docker
        # container action whose generated Dockerfile does
        # `FROM ghcr.io/pypa/gh-action-pypi-publish:${action_ref}`. PyPA publishes
        # that image tagged by RELEASE ref only, never by commit SHA, so a
        # SHA pin makes the image pull fail with `manifest unknown` before the
        # container (and the OIDC exchange) ever starts. `release/v1` is PyPA's
        # documented, image-backed ref.
        uses: pypa/gh-action-pypi-publish@release/v1

  finalize:
    name: Make the GitHub release public
    # The last cross-channel step, and the only irreversible one on this side.
    # Flipping the draft inside `attach` — with PyPI running afterwards — meant
    # an OIDC failure, a denied environment approval or a rejected upload left
    # a public release with no matching package version.
    #
    # If this job fails after PyPI succeeded, the release stays a draft and
    # nothing needs rebuilding: re-run this workflow with the same tag, or run
    # `release_pipeline.py --only publish` by hand. Do not bump the version and
    # do not rebuild — the artifacts on the draft are the ones PyPI has.
    if: inputs.publish
    needs: [attach, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the pipeline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          path: source
      - name: Publish, once PyPI has the version
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          python source/scripts/release_pipeline.py \
            --version "${TAG#v}" \
            --mode release \
            --only publish \
            --json
