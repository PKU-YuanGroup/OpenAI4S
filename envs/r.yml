# r — R data science (R 4.5.3)
#
# Portable top-level manifest matching Claude Science's R environment, with
# OpenAI4S's reporting packages made explicit. r-tidyverse resolves the full R
# package family; Conda resolves platform-specific compilers and native system
# libraries, which must not be copied from a single-machine full export.
name: r
channels:
  - conda-forge
dependencies:
  - r-base=4.5.3
  - r-tidyverse=2.0.0
  - r-data.table
  - r-ggplot2
  - r-rmarkdown
  - r-knitr
  - r-jsonlite
  # rmarkdown needs a real renderer, not just the R package.
  - pandoc=3.10
