name: Publish release

# Draft-first. `release: [created]` fires for a **draft** release too, which is
# the whole point: the assets, the SBOM and the provenance are built, verified,
# staged and re-verified while nothing is public, and the release is flipped to
# published only after every one of those held. Triggering on `published` — as
# this file used to — means the version is already visible while its assets are
# still being uploaded, which is the half-published state the proposal names.
#
# The ordering and every check live in scripts/release_pipeline.py rather than
# in this file, because a step that can only run on a release event is tested
# by the thing it is supposed to protect. That script runs on a laptop, under
# --dry-run, and under pytest.
on:
  release:
    types: [created]
  # Dry run: build and verify every artifact for a tag or branch without
  # publishing anything. Nothing in this path touches PyPI or the Release.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to build (dry run — nothing is published)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build verified distributions
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
      - name: Match the tag to both version declarations
        if: github.event_name == 'release'
        run: uv run --locked python scripts/verify_release_tag.py "${GITHUB_REF_NAME}"
      - name: Require an annotated tag on main
        if: github.event_name == 'release'
        run: |
          if [ "$(git cat-file -t "$GITHUB_REF_NAME")" != "tag" ]; then
            echo "::error::Release tags must be annotated."
            exit 1
          fi
          git merge-base --is-ancestor HEAD origin/main
      - name: Scan release sources
        run: uv run --locked python scripts/source_secret_scan.py
      - name: Build wheel and source distribution
        run: uv build --no-sources --out-dir dist --clear
      - name: Verify metadata and packaged runtime resources
        run: uv run --locked python scripts/verify_release_artifacts.py dist
      - name: Upload the exact distributions for publication
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  macos-app:
    name: Build the macOS app image (arm64)
    # The DMG embeds a relocatable CPython plus the native science wheels, so it
    # cannot be cross-built: this must run on an Apple Silicon runner.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') && !github.event.release.prerelease)
    runs-on: macos-14
    steps:
      - name: Checkout the immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build the .app and .dmg
        run: bash scripts/build_macos_dmg.sh
      - name: Verify the image
        # Fails closed on a runtime that did not relocate, an incomplete science
        # stack, a missing Web UI / R worker, a broken signature, or any
        # credential material swept into the bundle.
        run: python3 scripts/verify_macos_bundle.py dist/*.dmg
      - name: Upload the verified app image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos-app-image
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
          if-no-files-found: error
          retention-days: 1

  attach:
    name: Attach assets to the GitHub Release
    if: github.event_name == 'release'
    needs: [build, macos-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: assets/
      - name: Download the verified app image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-app-image
          path: assets/
      - name: Check out the pipeline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          path: source
      - name: Publish one checksum file covering every asset
        run: |
          cd assets
          rm -f OpenAI4S-*.dmg.sha256   # the per-image sidecar is folded into SHA256SUMS
          sha256sum openai4s-*.whl openai4s-*.tar.gz OpenAI4S-*.dmg > SHA256SUMS
          cat SHA256SUMS
      # Everything below — SBOM, provenance, verification, the staged upload,
      # the read-back, and the flip to published — is one script, so it is the
      # same code a maintainer can run with --dry-run on a laptop. The build
      # and test steps are skipped here because this job's inputs are the
      # artifacts the earlier jobs already produced and verified.
      - name: Stage, prove and verify the release, then publish it
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OPENAI4S_MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          python source/scripts/release_pipeline.py \
            --version "${GITHUB_REF_NAME#v}" \
            --mode release \
            --assets-dir assets \
            --json

  publish:
    name: Publish to PyPI with OIDC
    if: github.event_name == 'release'
    # The PyPI upload is the one step in this pipeline that cannot be undone —
    # a version number, once taken, is taken forever, and yanking is a
    # different thing from never having published. So it goes last, behind
    # every other required asset.
    #
    # `needs: build` alone let it run while the macOS image had failed to
    # build or failed `verify_macos_bundle.py`: `attach` would skip, and the
    # result was a release published on PyPI whose GitHub Release carried no
    # assets at all. That is precisely the half-published state this pipeline
    # exists to prevent.
    needs: [build, macos-app, attach]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openai4s/
    permissions:
      id-token: write
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions
        # NOT SHA-pinned, unlike every other action here: this one is a Docker
        # container action whose generated Dockerfile does
        # `FROM ghcr.io/pypa/gh-action-pypi-publish:${action_ref}`. PyPA publishes
        # that image tagged by RELEASE ref only, never by commit SHA, so a
        # SHA pin makes the image pull fail with `manifest unknown` before the
        # container (and the OIDC exchange) ever starts. `release/v1` is PyPA's
        # documented, image-backed ref.
        uses: pypa/gh-action-pypi-publish@release/v1
