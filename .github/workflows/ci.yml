# Default-safe PR CI: the offline gate.
#
# Security posture (do not weaken without a security review):
#   - Triggered by plain `pull_request` / `push` only. The privileged
#     `..._target` trigger variant is forbidden in this workflow: it would
#     let PR-controlled code run with access to repository secrets.
#   - `permissions` is read-only (contents: read) for every job.
#   - No secrets are referenced or injected anywhere in this workflow.
#   - GitHub-hosted runners only — no self-hosted runners.
#   - The test run is the default offline gate: pytest's addopts in
#     pyproject.toml deselect the opt-in markers (external / network /
#     live_llm / gpu / ssh / lab / docker / browser), so no live LLM,
#     network, GPU, SSH, Docker, or lab dependency is exercised.
#
# Live/external test jobs, if ever added, belong in a separate manually
# triggered workflow — never in this default PR gate.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-name:
    name: Branch naming policy
    # Enforces the CONTRIBUTING.md branch-naming table on PR head branches.
    # dependabot branches (dependabot/...) are exempt. `main` is allowed so
    # casual contributors can PR from their fork's main branch.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check head branch name
        env:
          # Never inline ${{ github.head_ref }} into `run:` — branch names
          # are attacker-controlled input; pass through env instead.
          HEAD_REF: ${{ github.head_ref }}
        run: |
          policy='^(main|next|(feat|fix|docs|test|refactor|chore|ui|harness|science|release|hotfix)/[a-z0-9][a-z0-9._-]{1,80})$'
          if printf '%s' "$HEAD_REF" | grep -Eq "$policy"; then
            echo "ok: $HEAD_REF"
          else
            echo "::error::Branch name '$HEAD_REF' violates the naming policy in CONTRIBUTING.md (expected main, next, or <prefix>/<name> with prefix one of feat|fix|docs|test|refactor|chore|ui|harness|science|release|hotfix)"
            exit 1
          fi

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: uv sync --locked
      - name: pre-commit (black, isort, ruff, hygiene hooks)
        run: uv run pre-commit run --all-files

  test:
    name: Offline tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies (same baseline as ./setup.sh)
        run: uv sync --locked --extra science
      - name: Byte-compile all first-party sources
        run: uv run python -m compileall -q openai4s openai4s_compute_provider tests
      - name: Collect tests (strict markers, default deselection)
        run: uv run pytest --collect-only -q
      - name: Run the offline suite (no secrets, no network, no hardware)
        # addopts already passes -q; a second -q would suppress the summary line.
        run: uv run pytest
